<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - yoNro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --soft-blue: #e0f2fe;
            --light-blue: #38bdf8;
            --medium-blue: #0ea5e9;
            --dark-blue: #0284c7;
            --white: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border-color: rgba(14, 165, 233, 0.15);
            --glow-color: rgba(14, 165, 233, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: var(--white);
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(14, 165, 233, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(56, 189, 248, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* Navigation */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(14, 165, 233, 0.1);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 2rem;
        }

        .logo {
            display: flex;
            align-items: center;
        }

        .logo a {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .logo-img {
            height: 40px;
            width: auto;
            object-fit: contain;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
            font-size: 0.95rem;
        }

        .nav-links a:hover {
            color: var(--medium-blue);
        }

        /* Register Section */
        .register-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 20px 60px;
        }

        .register-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 20px 60px var(--glow-color);
            max-width: 500px;
            width: 100%;
            padding: 50px 45px;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-logo h1 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, var(--dark-blue), var(--medium-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 300;
            letter-spacing: -1px;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h2 {
            font-size: 1.8rem;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-weight: 300;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--medium-blue);
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }

        .form-input::placeholder {
            color: #94a3b8;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--dark-blue), var(--medium-blue));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 8px 30px var(--glow-color);
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px var(--glow-color);
        }

        .btn-submit:active {
            transform: translateY(-1px);
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .footer a {
            color: var(--medium-blue);
            text-decoration: none;
            font-weight: 500;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .nav-container {
                padding: 1rem;
            }

            .logo-img {
                height: 32px;
            }

            .register-section {
                padding: 100px 20px 40px;
            }

            .register-container {
                padding: 40px 30px;
            }

            .brand-logo h1 {
                font-size: 2.2rem;
            }

            .header h2 {
                font-size: 1.5rem;
            }

            .input-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html">
                    <img src="logo.png" alt="yoNro Logo" class="logo-img">
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html#hero">Home</a></li>
                <li><a href="index.html#solution">Solution</a></li>
                <li><a href="index.html#ecosystem">Ecosystem</a></li>
                <li><a href="shop.html">Shop</a></li>
            </ul>
        </div>
    </nav>

    <!-- Register Section -->
    <section class="register-section">
        <div class="register-container">
            <div class="brand-logo">
                <h1>yoNro</h1>
            </div>

            <div class="header">
                <h2>Get Started</h2>
                <p>Create your account to begin your wellness journey</p>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label" for="name">Full Name</label>
                    <input type="text" id="name" class="form-input" placeholder="John Doe" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
                </div>
                
                <div class="input-row">
                    <div class="form-group">
                        <label class="form-label" for="age">Age</label>
                        <input type="number" id="age" class="form-input" placeholder="25" required min="13" max="120">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="phone">Phone (Optional)</label>
                        <input type="tel" id="phone" class="form-input" placeholder="+1 555-0000">
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Create a strong password" required>
                </div>

                <button type="submit" class="btn-submit">Create Account</button>
            </form>

            <div class="footer">
                Already have an account? <a href="index.html">Log In</a>
            </div>
        </div>
    </section>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Collect all form data
            const userData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                age: document.getElementById('age').value,
                phone: document.getElementById('phone').value || 'Not provided',
                registeredDate: new Date().toISOString()
            };
            
            // Save to localStorage for the app to access
            localStorage.setItem('yonro_user', JSON.stringify(userData));
            
            // Show success message
            const submitBtn = document.querySelector('.btn-submit');
            submitBtn.textContent = '✓ Account Created! Redirecting...';
            submitBtn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
            
            // Redirect to the app
            setTimeout(() => {
                window.location.href = 'APP/index.html';
            }, 1000);
        });
    </script>
</body>
</html>
